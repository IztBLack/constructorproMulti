name: iOS Build (IPA sin firmar)

# Compila la app iOS en un runner macOS de GitHub y publica un IPA SIN FIRMAR.
# 1) Como artifact (descarga manual con `gh run download`, flujo de respaldo).
# 2) En un Release rodante con tag fijo "sidestore" + un manifiesto apps.json,
#    para que SideStore lo instale/actualice con un toque desde el iPhone.
#
# Update sin falsos avisos: el build-number del IPA (CFBundleVersion) se fija al
# numero de run de Actions, y ese mismo valor va como buildVersion en apps.json.

on:
  workflow_dispatch: # permite lanzarlo manualmente desde la pestaña Actions
  push:
    branches: [main]

permissions:
  contents: write # necesario para crear/actualizar el Release

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - name: Dependencias
        run: flutter pub get

      - name: Generar código (Drift)
        run: dart run build_runner build

      - name: Build iOS (sin firma)
        # --build-number fija CFBundleVersion = nº de run (incrementa en cada push)
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Empaquetar IPA sin firmar
        run: |
          cd build/ios/iphoneos
          rm -rf Payload app-unsigned.ipa
          mkdir Payload
          mv Runner.app Payload/Runner.app
          find Payload -name '.DS_Store' -delete
          # ditto produce un archivo zip "limpio" estilo Apple, sin __MACOSX
          # ni atributos extendidos que confunden a los instaladores.
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload app-unsigned.ipa
          # Copia con nombre estable para la URL del Release.
          cp app-unsigned.ipa ConstructorPro.ipa
          echo "=== Estructura del IPA ==="
          unzip -l app-unsigned.ipa | head -25

      - name: Publicar IPA como artifact (respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: constructorpro-unsigned-ipa
          path: build/ios/iphoneos/app-unsigned.ipa
          if-no-files-found: error

      - name: Calcular metadatos del Source
        id: meta
        run: |
          IPA=build/ios/iphoneos/ConstructorPro.ipa
          SIZE=$(stat -f%z "$IPA")
          SHORTVER=$(grep '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//' | cut -d'+' -f1)
          echo "size=$SIZE"            >> "$GITHUB_OUTPUT"
          echo "shortver=$SHORTVER"    >> "$GITHUB_OUTPUT"
          echo "buildver=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%F)"      >> "$GITHUB_OUTPUT"

      - name: Generar apps.json (manifiesto SideStore)
        run: |
          DL="https://github.com/${{ github.repository }}/releases/download/sidestore/ConstructorPro.ipa"
          ICON="https://raw.githubusercontent.com/${{ github.repository }}/main/ios/Runner/Assets.xcassets/AppIcon.appiconset/Icon-App-1024x1024@1x.png"
          cat > apps.json <<EOF
          {
            "name": "ConstructorPro (Mario)",
            "identifier": "com.mario.constructorpro.source",
            "sourceURL": "https://github.com/${{ github.repository }}/releases/download/sidestore/apps.json",
            "apps": [
              {
                "name": "ConstructorPro",
                "bundleIdentifier": "com.mario.constructorpro",
                "developerName": "Mario",
                "subtitle": "Gestión de obras",
                "localizedDescription": "App de gestión de obras (build ${{ steps.meta.outputs.buildver }}).",
                "iconURL": "$ICON",
                "tintColor": "1565C0",
                "category": "productivity",
                "downloadURL": "$DL",
                "size": ${{ steps.meta.outputs.size }},
                "version": "${{ steps.meta.outputs.shortver }}",
                "versionDate": "${{ steps.meta.outputs.date }}",
                "versions": [
                  {
                    "version": "${{ steps.meta.outputs.shortver }}",
                    "buildVersion": "${{ steps.meta.outputs.buildver }}",
                    "date": "${{ steps.meta.outputs.date }}",
                    "localizedDescription": "Build ${{ steps.meta.outputs.buildver }} — ${{ steps.meta.outputs.date }}",
                    "downloadURL": "$DL",
                    "size": ${{ steps.meta.outputs.size }},
                    "minOSVersion": "14.0"
                  }
                ]
              }
            ]
          }
          EOF
          echo "=== apps.json generado ==="
          cat apps.json

      - name: Publicar Release rodante (IPA + apps.json)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IPA=build/ios/iphoneos/ConstructorPro.ipa
          if gh release view sidestore >/dev/null 2>&1; then
            gh release upload sidestore "$IPA" apps.json --clobber
          else
            gh release create sidestore "$IPA" apps.json \
              --title "SideStore Source (rolling)" \
              --notes "Release rodante: se sobreescribe en cada build de main. Fuente para SideStore."
          fi
